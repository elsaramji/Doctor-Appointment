  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/lottie/
    - assets/images/
    - assets/icons/
    - assets/svg/
    - assets/fonts/
    - assets/images/homePageImages/
    - assets/images/favPage/
    - assets/images/homePageImages/ba06b3e7882ffb9e60838270ea0dd9b82b74eda6.jpg

  #   - images/a_dot_ham.jpeg
